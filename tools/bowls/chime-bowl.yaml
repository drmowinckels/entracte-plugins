meta:
  name: Chime Bowl
  slug: chime_bowl
  category: ritual
  mood:
    - clear
    - metallic
  description:
    A clean struck-bowl source for short chimes. Same bowl FM timbre as
    Breath Bowl but with NO noise layer and NO reverb, so a percussive strike rings
    out cleanly instead of washing into an airy reverb tail.
  author: Matteo Bassi (preset adapted for Entracte chimes)
  engine_version: MANTICE_V15
  tags:
    - ritual
    - bowls
    - chime
global:
  duration_seconds: 10
  sample_rate: 44100
  bit_depth: 16-bit
reverb:
  enabled: false
  space: cathedral
  mix: 0.0
  decay_trim: 1.0
spatial:
  depth: 1.0
  wetness: 0.0
  swarm_density: 0.1
earth:
  enabled: false
air:
  enabled: false
saturation: 0.1
layers:
  - name: Bowl
    enabled: true
    synthesis:
      root: 196
      voices: 3
      ratios:
        - 1.0
        - 2.0
        - 3.56
    fm:
      ratios:
        - 1.0
        - 2.0
      index: 0.2
    dynamics:
      amp_min: 0.22
      amp_max: 0.32
      drift: 0.0015
      volume_db: 0.0
    harmonics: 4
    harmonic_decay: 0.7
    noise_amount: 0.0
    noise_color: pink
    elevation: 0
    elevation_motion: static
    elevation_speed: 0.0
    elevation_range: 0
    spatial_motion:
      quadrant: front_left
      speed: 0.0
      trajectory_x: orbit
  - name: Shimmer
    enabled: true
    synthesis:
      root: 523
      voices: 2
      ratios:
        - 1.0
        - 2.24
        - 3.67
    fm:
      ratios:
        - 1.0
        - 2.0
      index: 0.35
    dynamics:
      amp_min: 0.03
      amp_max: 0.05
      drift: 0.0015
      volume_db: -15.0
    harmonics: 5
    harmonic_decay: 0.7
    noise_amount: 0.0
    noise_color: pink
    elevation: 0
    elevation_motion: static
    elevation_speed: 0.0
    elevation_range: 0
    spatial_motion:
      quadrant: front_right
      speed: 0.0
      trajectory_x: orbit
notes:
  goal: A clean struck-bowl tone with no noise or reverb wash.
  listening_tip: Should ring like a bell, not breathe.
